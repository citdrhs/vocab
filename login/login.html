<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <title>Login</title>
</head>
<body onload="login_onload()">
 
    <div class="login-wrapper">
        <div class="card" id="login-card">
            <h1>Vocabulary Practice</h1>
            <p class="subtitle">Sign in to continue</p>
 
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="login-username" placeholder="Enter your username" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="Enter your password" />
            </div>
 
            <p class="error" id="login-error"></p>
 
            <button onclick="attemptLogin()">Login</button>
            <p class="switch">Don't have an account? <a href="#" onclick="showRegister()">Register</a></p>
        </div>
 
        <div class="card" id="register-card" style="display:none;">
            <h1>Create Account</h1>
            <p class="subtitle">Register as a new student</p>
 
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="reg-username" placeholder="Choose a username" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg-password" placeholder="Choose a password" />
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="reg-confirm" placeholder="Confirm your password" />
            </div>
 
            <p class="error" id="reg-error"></p>
            <p class="success" id="reg-success"></p>
 
            <button onclick="attemptRegister()">Register</button>
            <p class="switch">Already have an account? <a href="#" onclick="showLogin()">Login</a></p>
        </div>
    </div>
 
    <script src="login.js"></script>
</body>
</html>
